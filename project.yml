name: Aevra
options:
  bundleIdPrefix: com.aevra
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_BUNDLE_IDENTIFIER: com.aevra.app
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  Aevra:
    type: application
    platform: iOS
    sources:
      - path: Aevra
    settings:
      base:
        INFOPLIST_FILE: Aevra/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    info:
      path: Aevra/Info.plist
      properties:
        CFBundleDisplayName: Aevra
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        NSUserNotificationUsageDescription: Aevra uses notifications for reminders and focus sessions.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        BGTaskSchedulerPermittedIdentifiers: []
    scheme:
      testTargets:
        - AevraTests
  AevraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AevraTests
    dependencies:
      - target: Aevra
