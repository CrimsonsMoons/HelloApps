name: Build Aevra IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          pwd
          find . -maxdepth 3 -type f | sort

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app
        run: |
          xcodebuild \
            -project Aevra.xcodeproj \
            -scheme Aevra \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          rm -rf Payload
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/Aevra.app Payload/
          zip -r Aevra-Unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Aevra-Unsigned-IPA
          path: Aevra-Unsigned.ipa
